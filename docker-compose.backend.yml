services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restautech_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - restautech_backend_network

  db:
    image: postgres:15-alpine
    container_name: restautech_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-restautech_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restautech_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-restautech_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restautech_user} -d ${POSTGRES_DB:-restautech_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - restautech_backend_network

networks:
  restautech_backend_network:
    driver: bridge

volumes:
  postgres_data:
